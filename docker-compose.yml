services:
  database:
    image: postgres:18.4-trixie
    container_name: berp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: berp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d berp"]
      interval: 10s
      timeout: 10s
      retries: 10